<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
  overflow:hidden;
  -webkit-text-size-adjust:none;
}
#bg{
  position:fixed;inset:0;
  background:linear-gradient(180deg,#080010 0%,#050010 40%,#000008 100%);
}
#stars{position:fixed;inset:0;pointer-events:none}

/* ステータスバー */
#statusbar{
  position:fixed;top:0;left:0;right:0;
  height:44px;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px 0;
  color:#fff;
  font-size:13px;font-weight:600;
  z-index:100;
  background:linear-gradient(180deg,rgba(0,0,0,0.4) 0%,transparent 100%);
}
.sb-right{display:flex;gap:5px;align-items:center}
.signal{display:flex;gap:2px;align-items:flex-end}
.signal span{background:#fff;width:3px;border-radius:1px}
.battery{display:flex;align-items:center;gap:3px;font-size:11px}
.bat-icon{width:22px;height:12px;border:1px solid rgba(255,255,255,0.6);border-radius:2px;position:relative;padding:2px}
.bat-icon::after{content:'';position:absolute;right:-4px;top:3px;width:2px;height:6px;background:rgba(255,255,255,0.6);border-radius:0 1px 1px 0}
.bat-fill{height:100%;background:#fff;border-radius:1px;width:85%}

/* 上半分：時計エリア */
#clock-area{
  position:fixed;top:0;left:0;right:0;
  height:48%;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding-top:44px;
}
#clock{
  font-size:80px;font-weight:200;
  color:#fff;
  letter-spacing:-4px;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
#date{
  font-size:15px;font-weight:400;
  color:rgba(255,255,255,0.55);
  margin-top:8px;
  letter-spacing:0.05em;
}
#weekday-badge{
  margin-top:12px;
  font-size:11px;
  color:rgba(255,255,255,0.3);
  letter-spacing:0.15em;
}

/* 下半分：通知エリア */
#notif-area{
  position:fixed;bottom:0;left:0;right:0;
  height:52%;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:0 14px 34px;
  overflow:hidden;
}
#notif-stack{
  display:flex;flex-direction:column;
  gap:8px;
  justify-content:flex-end;
}

/* 通知カード */
.notif-card{
  background:rgba(28,28,36,0.82);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-radius:16px;
  border:0.5px solid rgba(255,255,255,0.1);
  padding:11px 13px;
  animation:slideIn 0.4s cubic-bezier(0.34,1.1,0.64,1) both;
  position:relative;
  overflow:hidden;
}
.notif-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 50%);
  pointer-events:none;
}
@keyframes slideIn{
  from{opacity:0;transform:translateY(-16px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.notif-exit{
  transition:opacity 0.35s,transform 0.35s;
  opacity:0;transform:scale(0.95) translateY(-10px);
}
.notif-header{
  display:flex;align-items:center;gap:7px;
  margin-bottom:5px;
}
.app-icon{
  width:20px;height:20px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.app-name{font-size:11px;color:rgba(255,255,255,0.42);flex:1;letter-spacing:0.04em}
.notif-time{font-size:10px;color:rgba(255,255,255,0.28)}
.notif-sender{font-size:13px;font-weight:600;color:#fff;margin-bottom:3px;line-height:1.3}
.notif-body{font-size:12.5px;color:rgba(255,255,255,0.78);line-height:1.5;word-break:break-all}
.notif-footer{display:flex;align-items:center;gap:8px;margin-top:6px}
.read-badge{font-size:10px;color:#4fc3f7;letter-spacing:0.05em}
.unread-dot{width:7px;height:7px;border-radius:50%;background:#4fc3f7;margin-left:auto}
.voice-msg{font-size:10px;color:rgba(255,255,255,0.38);display:flex;align-items:center;gap:4px}

/* ホームインジケーター */
#home-ind{
  position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
  width:130px;height:5px;
  background:rgba(255,255,255,0.25);border-radius:3px;
}
</style>

// ========== 時計 ==========
const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date');
const sbClockEl = document.getElementById('sb-clock');

const DAYS = ['日','月','火','水','木','金','土'];
function updateClock(){
  const d = new Date();
  const h = d.getHours();
  const m = d.getMinutes().toString().padStart(2,'0');
  const timeStr = `${h}:${m}`;
  clockEl.textContent = timeStr;
  sbClockEl.textContent = timeStr;
  const month = d.getMonth()+1;
  const day = d.getDate();
  const wd = DAYS[d.getDay()];
  dateEl.textContent = `${month}月${day}日（${wd}）`;
}
updateClock();
setInterval(updateClock, 1000);

// ========== 通知ロジック ==========
const stack = document.getElementById('notif-stack');
const MAX_VISIBLE = 4;
let shown = [];
let pool = [];
let poolIdx = 0;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
pool = shuffle(messages);

function nowTime(){
  const d=new Date();
  return `${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function addNotif(){
  if(poolIdx >= pool.length){
    pool = shuffle(messages);
    poolIdx = 0;
  }
  const m = pool[poolIdx++];

  // 古いもの削除
  if(shown.length >= MAX_VISIBLE){
    const old = shown.shift();
    old.classList.add('notif-exit');
    setTimeout(()=>old.remove(), 380);
  }

  const card = document.createElement('div');
  card.className = 'notif-card';

  const iconBg = m.color;
  const footerHTML = m.meta.read
    ? `<div class="notif-footer"><span class="read-receipt">既読</span></div>`
    : m.meta.dot
    ? `<div class="notif-footer"><div class="unread-dot"></div></div>`
    : m.meta.voice
    ? `<div class="notif-footer"><span class="voice-msg">▶ 音声メッセージ 0:12</span></div>`
    : '';

  card.innerHTML = `
    <div class="notif-header">
      <div class="app-icon" style="background:${iconBg}">${m.icon}</div>
      <span class="app-name">${m.app==='line'?'LINE':m.app==='ig'?'Instagram':m.app==='stripe'?'Stripe':m.app==='mail'?'メール':'カレンダー'}</span>
      <span class="notif-time">${nowTime()}</span>
    </div>
    <div class="notif-sender">${m.from}</div>
    <div class="notif-body">${m.body}</div>
    ${footerHTML}
  `;

  stack.appendChild(card);
  shown.push(card);
}

// 星パーティクル
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function resize(){
  canvas.width=innerWidth; canvas.height=innerHeight;
  stars = Array.from({length:55},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.0+0.2,
    o:Math.random()*0.35+0.05,
    speed:Math.random()*0.4+0.1,
    phase:Math.random()*Math.PI*2
  }));
}
resize();
window.addEventListener('resize',resize);
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const t=Date.now()/1000;
  stars.forEach(s=>{
    const op = s.o*(0.5+0.5*Math.sin(t*s.speed+s.phase));
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${op})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// 起動時に2枚表示 → 自動追加
addNotif();
setTimeout(addNotif, 800);
setTimeout(addNotif, 1600);

function schedule(){
  addNotif();
  const next = 1800 + Math.random()*2000;
  setTimeout(schedule, next);
}
setTimeout(schedule, 3000);
</script>
